name: Build APK

# Builds a debug APK in the cloud — no local Android toolchain needed.
# After a run finishes, download the APK from the run's "Artifacts" section.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs Gradle 8.11.1 and puts `gradle` on PATH so we can generate the wrapper jar.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # The wrapper jar isn't committed; generate it with the gradle on PATH, then build via it.
      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x ./gradlew

      # Inject the OpenAI key from a GitHub Actions secret (Settings → Secrets → Actions).
      # Add a repo secret named OPENAI_API_KEY. If absent, the app still builds (AI off).
      - name: Write local.properties
        run: |
          echo "VITE_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
