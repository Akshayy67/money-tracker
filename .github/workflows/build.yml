name: Build APK

# Builds a debug APK in the cloud — no local Android toolchain needed.
# After a run finishes, download the APK from the run's "Artifacts" section.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs Gradle 8.11.1 and puts `gradle` on PATH so we can generate the wrapper jar.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # The wrapper jar isn't committed; generate it with the gradle on PATH, then build via it.
      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x ./gradlew

      # Inject the OpenAI key from a GitHub Actions secret (Settings → Secrets → Actions).
      # Add a repo secret named OPENAI_API_KEY. If absent, the app still builds (AI off).
      - name: Write local.properties
        run: |
          echo "VITE_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> local.properties

      # Print exactly which commit is being built so logs map to source unambiguously.
      - name: Show commit
        run: |
          echo "BUILDING COMMIT: $(git rev-parse HEAD)"
          echo "SUBJECT: $(git log -1 --pretty=%s)"

      # Compile Kotlin with KSP EXCLUDED (-x kspDebugKotlin). KSP's generic
      # "[MissingType]: AppDatabase references a type that is not present" masks the real cause; by
      # skipping KSP we force kotlinc to report the actual e:/error: lines (file + line), or compile
      # clean — which would prove the code is fine and the issue is purely Room/KSP config.
      # `|| true` so this diagnostic never aborts the job before the artifact upload.
      - name: Diagnose - Kotlin compile WITHOUT KSP
        run: |
          echo "================ KOTLIN COMPILE (KSP EXCLUDED) ================"
          ./gradlew compileDebugKotlin -x kspDebugKotlin --continue 2>&1 | tee kotlin-compile.log || true
          echo "---------------- e:/error: lines only ----------------"
          grep -nE "^e: |: error:|Unresolved|Type mismatch|None of the following|Conflicting|argument type mismatch|No value passed|too many|cannot access" kotlin-compile.log || echo "NO KOTLIN ERRORS — code compiles clean without KSP (issue is Room/KSP config, not code)"
          echo "=============================================================="

      - name: Upload kotlin compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-compile-log
          path: kotlin-compile.log
          if-no-files-found: ignore

      # Build, teeing all output to a file so we can surface the real compiler errors on failure.
      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      # On failure, print ONLY the actual Kotlin/KSP error lines (the `e:` / error: lines) so they
      # show up clearly in the run summary — these are the lines needed to diagnose the failure.
      - name: Show compiler errors
        if: failure()
        run: |
          echo "================ COMPILER ERRORS (e: / error:) ================"
          grep -nE "^e: |error: |: error:|Unresolved reference|MissingType|Serializer has not been found|None of the following" build-output.log || echo "No e:/error: lines matched — see full log artifact."
          echo "=============================================================="

      # If only the generic Room MissingType appears, re-run KSP with --info and print the lines
      # around the error so the actual offending type/element is captured for diagnosis.
      - name: Verbose KSP diagnosis (on failure)
        if: failure()
        run: |
          echo "================ VERBOSE KSP (--info window) ================"
          ./gradlew :app:kspDebugKotlin --info --rerun-tasks 2>&1 | tee ksp-info.log | grep -nE -B2 -A6 "MissingType|references a type|XProcessor|Unable to|RoomProcessor|cannot find|error\.NonExistentClass|InvalidType" | head -200 || echo "no extra context found"
          echo "============================================================"

      - name: Upload verbose KSP log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ksp-info-log
          path: ksp-info.log
          if-no-files-found: ignore

      # Always upload the full build log so it can be downloaded and inspected.
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
